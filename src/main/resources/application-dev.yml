spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/music_catalog
    username: music_user
    password: music_password
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  docker:
    compose:
      enabled: true
      file: compose.yaml
      lifecycle-management: start-and-stop